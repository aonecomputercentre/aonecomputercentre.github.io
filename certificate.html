<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate</title>
<style>
body{
font-family:Arial;
background:#f4f8ff;
padding:20px;
}

.certificate{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border:8px solid #0066cc;
text-align:center;
}

h1{
color:#0066cc;
}

h2{
color:#004a99;
}

</style>
</head>
<body>

<div class="certificate">

<h1>A-One Computer Centre</h1>

<h2>Rajiv Gandhi Computer Saksharta Mission (RGCSM)</h2>

<h1>Certificate of Completion</h1>

<p>This is to certify that</p>

<h2 id="studentName">Student Name</h2>

<p>has successfully completed the</p>

<h2>CCC Mock Test</h2>

<p>Score: __________</p>

<p>Percentage: __________</p>

<p>Result: PASS / FAIL</p>

<br><br>

<p>Director</p>

<h3>A-One Computer Centre</h3>
  <br><br>

<button onclick="window.print()">
Print Certificate
</button>

</div>
  <script>
let name = localStorage.getItem("studentName");

if(name){
document.getElementById("studentName").innerHTML = name;
}
</script>

</body>
</html>
